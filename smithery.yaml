name: config-validator-ai-mcp
description: Config Validator Ai automation via MCP. Includes validate toml, validate
  ini, validate dotenv. By MEOK AI Labs.
version: 1.0.0
tools:
- name: validate_toml
  description: Validate TOML configuration file syntax.
  parameters:
  - name: content
    type: string
    required: true
- name: validate_ini
  description: Validate INI configuration file syntax.
  parameters:
  - name: content
    type: string
    required: true
- name: validate_dotenv
  description: Validate .env file format and detect common issues.
  parameters:
  - name: content
    type: string
    required: true
- name: suggest_fixes
  description: Suggest fixes for common configuration file issues.
  parameters:
  - name: content
    type: string
    required: true
  - name: config_type
    type: string
    required: false
